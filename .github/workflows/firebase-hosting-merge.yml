name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Verify Firebase Secret Exists
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEAK_ALLOY_426016_B4 }}" ]; then
            echo "Secret is missing"
            exit 1
          else
            echo "Secret exists"
          fi

      - name: Write service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEAK_ALLOY_426016_B4 }}' > service-account.json

      - name: Verify file exists
        run: |
          ls -la
          cat service-account.json | jq '.project_id'

      - name: Validate Secret Structure
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEAK_ALLOY_426016_B4 }}' > service-account.json

          jq '{
            type,
            project_id,
            client_email,
            private_key_id
          }' service-account.json

      - name: Test Firebase Auth
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/service-account.json
          npx firebase-tools projects:list --debug
