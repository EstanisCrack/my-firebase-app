name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Verify Firebase Secret Exists
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEAK_ALLOY_426016_B4 }}" ]; then
            echo "Secret is missing"
            exit 1
          else
            echo "Secret exists"
          fi

      - name: Write service account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEAK_ALLOY_426016_B4 }}' > service-account.json

      - name: Validate service account JSON
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEAK_ALLOY_426016_B4 }}' > service-account.json
          jq . service-account.json > /dev/null

      - name: Authenticate GCP
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/service-account.json
        run: |
          npx firebase-tools projects:list
